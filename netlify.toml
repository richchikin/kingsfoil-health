[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect www to apex
[[redirects]]
  from = "https://www.kingsfoilhealth.com/*"
  to = "https://kingsfoilhealth.com/:splat"
  status = 301
  force = true

# Pretty 404
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
