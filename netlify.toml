[build]
  # Strict citation audit + Astro build. Deploy fails on any high-severity
  # unsourced claim. To bypass temporarily, run with AUDIT_SKIP=1.
  command = "npm run build:strict"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect www to apex
[[redirects]]
  from = "https://www.kingsfoilhealth.com/*"
  to = "https://kingsfoilhealth.com/:splat"
  status = 301
  force = true

# Netlify automatically serves /404.html for missing pages.
# No catch-all redirect needed.
